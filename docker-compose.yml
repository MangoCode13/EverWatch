services:
  mariadb:
    image: mariadb:10.11
    container_name: openemr_mariadb
    restart: unless-stopped
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 20

  seed:
    image: python:3.12-slim
    depends_on:
      - mariadb
    volumes:
      - ./scripts:/scripts
    environment:
      DB_HOST: mariadb
      DB_USER: openemr
      DB_PASSWORD: openemrpass
      DB_NAME: openemr
    command: >
      sh -c "
      pip install pymysql faker &&
      python /scripts/seed_clinic_doctors_patients.py
      "

  openemr:
    image: openemr/openemr:7.0.2
    container_name: openemr_app
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    ports:
      - "${OPENEMR_HTTP_PORT}:80"
      - "${OPENEMR_HTTPS_PORT}:443"
    environment:
      # DB connection
      MYSQL_HOST: mariadb
      MYSQL_ROOT_PASS: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASS: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}

      # OpenEMR initial admin
      OE_USER: ${OPENEMR_ADMIN_USER}
      OE_PASS: ${OPENEMR_ADMIN_PASS}

      # Optional: helps some installs avoid interactive steps
      # (safe to keep; if unused, it is ignored)
      TZ: ${TZ}
    volumes:
      - openemr_sites:/var/www/localhost/htdocs/openemr/sites
      - openemr_logs:/var/log
      - ./logstash_certs:/etc/openemr/atna-certs:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost/interface/login/login.php >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 40

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.12.0
    container_name: filebeat
    restart: unless-stopped
    user: root
    # Ensures filebeat doesn't fail due to strict file permissions on the config
    command: ["filebeat", "-e", "--strict.perms=false"]
    volumes:
      - ./filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - ./geoip-db/GeoLite2-City.mmdb:/usr/share/filebeat/geoip/GeoLite2-City.mmdb:ro
      - openemr_logs:/var/log/openemr:ro
    environment:
      ELASTICSEARCH_USERNAME: elastic
      ELASTICSEARCH_PASSWORD: ${ELASTIC_PASSWORD}
    depends_on:
      - openemr
      - mariadb

  logstash:
    image: docker.elastic.co/logstash/logstash:8.12.0
    container_name: logstash
    restart: unless-stopped
    volumes:
      - ./logstash_certs:/usr/share/logstash/config/certs
      - ./logstash/pipeline/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    ports:
      - "6514:6514"
    environment:
      LS_JAVA_OPTS: "-Xmx512m -Xms512m"
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
      ELASTICSEARCH_USERNAME: elastic
      ELASTICSEARCH_PASSWORD: ${ELASTIC_PASSWORD}
    depends_on:
      - elasticsearch

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - 9200:9200
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
      - ./geoip-db/GeoLite2-City.mmdb:/usr/share/elasticsearch/config/ingest-geoip/GeoLite2-City.mmdb:ro

  # Initialization service to configure Elasticsearch security
  # Runs once after Elasticsearch starts to set up authentication passwords
  # Required for Kibana and other services to authenticate with Elasticsearch
  init-passwords:
    # Initializes Elasticsearch security passwords on first startup
    # - Waits for Elasticsearch to be healthy
    # - Sets the kibana_system user password for Kibana authentication
    # This must complete before Kibana starts
    image: curlimages/curl:latest
    volumes:
      - ./init-passwords.sh:/init-passwords.sh:ro
    command: sh /init-passwords.sh
    environment:
      ELASTIC_PASSWORD: ${ELASTIC_PASSWORD}
      KIBANA_SYSTEM_PASSWORD: ${KIBANA_SYSTEM_PASSWORD}
    depends_on:
      - elasticsearch

  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: kibana
    restart: unless-stopped
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${KIBANA_SYSTEM_PASSWORD}
      - XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY=${KIBANA_ENCRYPTEDSAVEDOBJECTS_KEY}
      - XPACK_SECURITY_ENCRYPTIONKEY=${KIBANA_SECURITY_SESSION_KEY}
      - XPACK_REPORTING_ENCRYPTIONKEY=${KIBANA_REPORTING_KEY}
      - XPACK_ACTIONS_ALLOWEDHOSTS=${KIBANA_ALLOWED_HOSTS}
    ports:
      - 5601:5601
    volumes:
      - kibana_config:/usr/share/kibana/config
    depends_on:
      - elasticsearch
      - init-passwords

volumes:
  mariadb_data:
  openemr_sites:
  openemr_logs:
  elasticsearch_data:
  kibana_config:
