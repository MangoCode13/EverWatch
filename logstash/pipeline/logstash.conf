input {
  tcp {
    id => "atna_tls_6514"
    host => "0.0.0.0"
    port => 6514
    ssl_enabled => true
    ssl_certificate => "/usr/share/logstash/config/certs/logstash.crt"
    ssl_key => "/usr/share/logstash/config/certs/logstash.key"
    ssl_client_authentication => "required"
    ssl_certificate_authorities => ["/usr/share/logstash/config/certs/ca.crt"]

    
    # Use the multiline codec for Logstash input 
    # to ensure the entire <AuditMessage> block is treated as a single event
    codec => multiline {
      pattern => "<AuditMessage" 
      negate => true
      what => "previous"
      auto_flush_interval => 5
    }
    add_field => { "ingest_source" => "openemr_atna_tls" }
  }
}

# Create filter to parse the XML and extract relevant fields from the ATNA messages including $user, $group, $event, $patient_id, $outcome, $comments.
filter {
  if [ingest_source] == "openemr_atna_tls" {
    
    # Isolate the XML payload by removing syslog headers for RFC 5424 
    mutate {
      gsub => [ "message", "^.*(<AuditMessage)", "\1" ]
    }

    # Extracting the variables used in sendAtnaAuditMsg()
    # Maps to createRfc3881Msg($user, $group, $event, $patient_id, $outcome, $comments)
    xml {
      source => "message"
      target => "atna"
      force_array => false
      remove_namespaces => true
      xpath => [
        # $user - the human requestor performing the action (from ActiveParticipant)
        "/AuditMessage/ActiveParticipant[@UserIsRequestor='true']/@UserID", "audit_user",
        # $user - human user identifier (code='11' per RFC 3881) - preferred source for actual username
        "/AuditMessage/ParticipantObjectIdentification[ParticipantObjectIDTypeCode/@code='11']/@ParticipantObjectID", "human_user",
        # $group - facility/audit source identifier
        "/AuditMessage/AuditSourceIdentification/@AuditSourceID", "audit_group",
        # $event - event display name (avoid 'event' - reserved word)
        "/AuditMessage/EventIdentification/EventID/@displayName", "event_type",
        # $patient_id - patient number (code='2' per RFC 3881)
        "/AuditMessage/ParticipantObjectIdentification[ParticipantObjectIDTypeCode/@code='2']/@ParticipantObjectID", "audit_patient_id",
        # $outcome - numeric indicator (0=success, 4=minor, 8=serious, 12=major failure)
        "/AuditMessage/EventIdentification/@EventOutcomeIndicator", "audit_outcome",
        # $comments - description from ParticipantObjectQuery (base64), ParticipantObjectDetail value, or ParticipantObjectName
        "/AuditMessage/ParticipantObjectIdentification/ParticipantObjectQuery/text()", "audit_comments_query",
        "/AuditMessage/ParticipantObjectIdentification/ParticipantObjectDetail/@value", "audit_comments_detail",
        "/AuditMessage/ParticipantObjectIdentification/ParticipantObjectName/text()", "audit_comments_name",
        # Supplemental: source IP for security context
        "/AuditMessage/ActiveParticipant[@UserIsRequestor='true']/@NetworkAccessPointID", "audit_src_ip",
        # Supplemental: event timestamp
        "/AuditMessage/EventIdentification/@EventDateTime", "event_time"
      ]
    }

    # CHECK B/C NO INGESTED. Convert the extracted time to the official @timestamp field
    date {
      match => [ "event_time", "ISO8601" ]
      target => "@timestamp"
    }

    # Format the final message matching createRfc3881Msg($user, $group, $event, $patient_id, $outcome, $comments)
    # THIS IS WHAT KIBANA WILL DISPLAY IN THE LOGS VIEW - the structured fields are preserved in the [audit] object for querying and visualization
    ruby {
      code => '
        def first(v); v.is_a?(Array) ? v[0] : v; end
        
        # Extract user - prefer human_user (code=11) over ActiveParticipant
        human_user = first(event.get("human_user"))
        active_user = first(event.get("audit_user"))
        
        # Use human_user if available, otherwise fall back to ActiveParticipant
        if human_user && !human_user.to_s.empty?
          user = human_user.to_s
        elsif active_user
          user = active_user.to_s
          # Clean up pipe-delimited format (e.g., "localhost|OpenEMR" -> "OpenEMR")
          user = user.split("|").last if user.include?("|")
        else
          user = "system"
        end
        
        # Extract group (facility/audit source)
        group = first(event.get("audit_group")) || "Default"
        group = group.to_s
        
        # Extract event name (field renamed to avoid reserved word collision)
        event_type = first(event.get("event_type")) || "Activity"
        event_type = event_type.to_s
        
        # Extract patient_id
        patient_id = first(event.get("audit_patient_id")) || "-"
        patient_id = patient_id.to_s
        
        # Map outcome indicator to human-readable value
        outcome_code = first(event.get("audit_outcome")).to_s
        outcome_map = { "0" => "success", "4" => "failure", "8" => "serious_failure", "12" => "major_failure" }
        outcome = outcome_map[outcome_code] || "unknown"
        
        # Extract comments - try base64-encoded sources first (ParticipantObjectQuery, ParticipantObjectDetail), then ParticipantObjectName
        require "base64"
        comments_query = first(event.get("audit_comments_query"))
        comments_detail = first(event.get("audit_comments_detail"))
        comments_name = first(event.get("audit_comments_name"))
        comments = ""
        
        # Try ParticipantObjectQuery (base64)
        if comments_query && !comments_query.to_s.strip.empty?
          begin
            comments = Base64.decode64(comments_query.to_s).force_encoding("UTF-8")
          rescue
            comments = comments_query.to_s
          end
        end
        
        # Try ParticipantObjectDetail/@value (base64) if still empty
        if comments.empty? && comments_detail && !comments_detail.to_s.strip.empty?
          begin
            comments = Base64.decode64(comments_detail.to_s).force_encoding("UTF-8")
          rescue
            comments = comments_detail.to_s
          end
        end
        
        # Fallback to ParticipantObjectName (plain text)
        if comments.empty? && comments_name && !comments_name.to_s.strip.empty?
          comments = comments_name.to_s
        end
        
        # Extract source IP
        ip = first(event.get("audit_src_ip")) || "internal"
        ip = ip.to_s
        
        # TESTING: Override private IPs with a public IP for GeoIP testing (remove after testing)
        ip = "73.223.234.53" if ip.start_with?("172.", "192.168.", "10.", "127.")
        
        # Format timestamp
        ts = event.get("@timestamp")&.time&.localtime&.strftime("%Y-%m-%d %H:%M:%S") || Time.now.strftime("%Y-%m-%d %H:%M:%S")
        
        # Set structured fields for Elasticsearch
        event.set("[audit][user]", user)
        event.set("[audit][group]", group)
        event.set("[audit][event_type]", event_type)
        event.set("[audit][patient_id]", patient_id)
        event.set("[audit][outcome]", outcome)
        event.set("[audit][comments]", comments)
        event.set("[audit][src_ip]", ip)
        
        # Format message: timestamp  event_type  user  group  patient_id  outcome: ip [comments]
        msg = "#{ts}  #{event_type}  #{user}  #{group}  #{patient_id}  #{outcome}: #{ip}"
        msg += " [#{comments}]" unless comments.nil? || comments.empty?
        event.set("message", msg)
      '
    }

    # Clean up temporary extraction fields (structured data preserved in [audit] object)
    # Remove the original XML message and intermediate fields to keep the final document clean and focused on the relevant audit data
    mutate {
      remove_field => ["atna", "audit_user", "human_user", "audit_group", "event_type", "audit_patient_id", "audit_outcome", "audit_comments_query", "audit_comments_detail", "audit_comments_name", "audit_src_ip", "event_time", "tags"]
    }

    # GeoIP enrichment - convert source IP to geographical fields
    # Only attempt GeoIP lookup for non-private IPs to avoid _geoip_lookup_failure tags
    if [audit][src_ip] !~ /^(10\.|172\.(1[6-9]|2[0-9]|3[01])\.|192\.168\.|127\.|169\.254\.)/ {
      geoip {
        source => "[audit][src_ip]"
        target => "[client][geo]"
        fields => ["COUNTRY_CODE2", "COUNTRY_NAME", "REGION_NAME", "CITY_NAME", "LOCATION"]
      }
    }
  }
}

# Output to Elasticsearch with index pattern "openemr-atna-%{+YYYY.MM.dd}" for daily indices
output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "openemr-atna-%{+YYYY.MM.dd}"
  }
}